apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aetherlake-ingress
  namespace: aetherlake
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: minio.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio-console
                port:
                  number: 9090
    - host: trino.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-data-stack-trino
                port:
                  number: 8080
    - host: polaris.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-data-stack-polaris
                port:
                  number: 8181
    - host: keycloak.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: security-stack-keycloak
                port:
                  number: 80
    - host: airflow.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-data-stack-airflow
                port:
                  number: 8080
    - host: milvus.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-data-stack-milvus-attu
                port:
                  number: 3000
    - host: superset.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-data-stack-superset
                port:
                  number: 8088

