apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aetherlake-ingress
  namespace: aetherlake
  annotations:
    kubernetes.io/ingress.class: nginx
    # Self-signed CA managed by cert-manager (see aetherlake-tls.yaml).
    cert-manager.io/cluster-issuer: aetherlake-ca
    # Keep plain HTTP working: the SSO issuer/redirect URLs are still http://
    # and in-cluster OIDC discovery resolves these hosts straight to the
    # backing Services. Forcing a redirect here would break those flows.
    # HTTPS is served in parallel for clients that trust the AetherLake CA.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  tls:
    - hosts:
        - minio.aetherlake.local
        - polaris.aetherlake.local
        - keycloak.aetherlake.local
        - airflow.aetherlake.local
        - milvus.aetherlake.local
        - superset.aetherlake.local
      secretName: aetherlake-tls
  rules:
    - host: minio.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio-console
                port:
                  number: 9090
    - host: polaris.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-data-stack-polaris
                port:
                  number: 8181
    - host: keycloak.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: security-stack-keycloak
                port:
                  number: 80
    - host: airflow.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-data-stack-webserver
                port:
                  number: 8080
    - host: milvus.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-data-stack-milvus-attu
                port:
                  number: 3000
    - host: superset.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-data-stack-superset
                port:
                  number: 8088
---
# Trino gets its own Ingress so basic auth can be scoped to it alone. Trino
# itself runs without authentication and trusts the X-Trino-User header, so an
# unauthenticated ingress route would hand full SQL access (as any identity) to
# anyone who can reach it. The htpasswd secret (trino-ingress-auth) is created
# by install.sh with a random password; retrieve it from the
# aetherlake-credentials secret (key: trino-ingress-password).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aetherlake-trino-ingress
  namespace: aetherlake
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: aetherlake-ca
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: trino-ingress-auth
    nginx.ingress.kubernetes.io/auth-realm: "Trino (user: trino — password in aetherlake-credentials/trino-ingress-password)"
spec:
  tls:
    - hosts:
        - trino.aetherlake.local
      secretName: aetherlake-trino-tls
  rules:
    - host: trino.aetherlake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-data-stack-trino
                port:
                  number: 8080
