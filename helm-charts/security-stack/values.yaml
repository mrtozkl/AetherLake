# Security Stack — Keycloak SSO on upstream-maintained images (no Bitnami).
global:
  domain: "aetherlake.local"
  # Unified credentials secret (created by install.sh) that backs the admin
  # password, the Keycloak DB password and every OIDC client secret.
  existingSecret: "aetherlake-credentials"

keycloak:
  enabled: true
  # Upstream Keycloak server image.
  image: "quay.io/keycloak/keycloak:26.3.3"
  adminUser: admin
  # Official PostgreSQL image for Keycloak's database.
  postgres:
    image: "postgres:16-alpine"
  # Upstream realm-import tool (replaces the Bitnami keycloak-config-cli image).
  # Tag format is <config-cli-version>-<keycloak-major>.
  configCli:
    image: "adorsys/keycloak-config-cli:6.5.1-26"
