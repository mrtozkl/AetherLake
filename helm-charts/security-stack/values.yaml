# Security Stack Global Configurations
global:
  domain: "aetherlake.local"
  # Master Secret managed by the Control Panel API
  existingSecret: "aetherlake-credentials"

# Bitnami Keycloak Chart Configuration
keycloak:
  enabled: true
  image:
    repository: bitnamilegacy/keycloak
  postgresql:
    image:
      repository: bitnamilegacy/postgresql
  keycloakConfigCli:
    image:
      repository: bitnamilegacy/keycloak-config-cli
      
  auth:
    adminUser: admin
    existingSecret: "aetherlake-credentials"
    passwordSecretKey: "keycloak-admin-password"
  extraEnvVars:
    - name: KC_PROXY_HEADERS
      value: "xforwarded"
    - name: KC_HOSTNAME_STRICT
      value: "false"
    - name: KC_HOSTNAME
      value: "keycloak.aetherlake.local"

  keycloakConfigCli:
    enabled: true
    image:
      repository: bitnamilegacy/keycloak-config-cli
    configuration:
      aetherlake-realm.json: |
        {
          "realm": "aetherlake",
          "enabled": true,
          "attributes": {
            "frontendUrl": "http://keycloak.${global.domain}/auth/"
          },
          "users": [
            {
              "username": "admin",
              "enabled": true,
              "realmRoles": ["data-admin"],
              "credentials": [
                {
                  "type": "password",
                  "value": "admin",
                  "temporary": false
                }
              ]
            }
          ],
          "roles": {
            "realm": [
              {
                "name": "data-admin",
                "description": "Administrator for the Data Platform"
              },
              {
                "name": "data-scientist",
                "description": "Data Scientist Role"
              },
              {
                "name": "data-engineer",
                "description": "Data Engineer Role"
              }
            ]
          },
          "components": {},
          "clients": [
            {
              "clientId": "aetherlake-client",
              "enabled": true,
              "publicClient": false,
              "redirectUris": ["*"],
              "protocol": "openid-connect"
            },
            {
              "clientId": "trino",
              "enabled": true,
              "publicClient": false,
              "redirectUris": ["*"],
              "protocol": "openid-connect",
              "protocolMappers": [
                {
                  "name": "group-mapper",
                  "protocol": "openid-connect",
                  "protocolMapper": "oidc-group-membership-mapper",
                  "consentRequired": false,
                  "config": {
                    "full.path": "false",
                    "id.token.claim": "true",
                    "access.token.claim": "true",
                    "claim.name": "groups",
                    "userinfo.token.claim": "true"
                  }
                }
              ]
            },
            {
              "clientId": "airflow",
              "enabled": true,
              "publicClient": false,
              "redirectUris": ["*"],
              "protocol": "openid-connect",
              "protocolMappers": [
                {
                  "name": "group-mapper",
                  "protocol": "openid-connect",
                  "protocolMapper": "oidc-group-membership-mapper",
                  "consentRequired": false,
                  "config": {
                    "full.path": "false",
                    "id.token.claim": "true",
                    "access.token.claim": "true",
                    "claim.name": "groups",
                    "userinfo.token.claim": "true"
                  }
                }
              ]
            },
            {
              "clientId": "polaris",
              "enabled": true,
              "publicClient": false,
              "redirectUris": ["*"],
              "protocol": "openid-connect",
              "protocolMappers": [
                {
                  "name": "principal-id-mapper",
                  "protocol": "openid-connect",
                  "protocolMapper": "oidc-hardcoded-claim-mapper",
                  "consentRequired": false,
                  "config": {
                    "claim.name": "principal_id",
                    "claim.value": "0",
                    "jsonType.label": "long",
                    "access.token.claim": "true",
                    "id.token.claim": "true"
                  }
                },
                {
                  "name": "principal-name-mapper",
                  "protocol": "openid-connect",
                  "protocolMapper": "oidc-usermodel-property-mapper",
                  "consentRequired": false,
                  "config": {
                    "user.attribute": "username",
                    "claim.name": "principal_name",
                    "access.token.claim": "true",
                    "id.token.claim": "true"
                  }
                },
                {
                  "name": "principal-roles-mapper",
                  "protocol": "openid-connect",
                  "protocolMapper": "oidc-hardcoded-claim-mapper",
                  "consentRequired": false,
                  "config": {
                    "claim.name": "principal_roles",
                    "claim.value": "[\"server_admin\", \"catalog_admin\"]",
                    "jsonType.label": "JSON",
                    "access.token.claim": "true",
                    "id.token.claim": "true"
                  }
                }
              ]
            },
            {
              "clientId": "minio",
              "enabled": true,
              "publicClient": false,
              "serviceAccountsEnabled": true,
              "directAccessGrantsEnabled": true,
              "secret": "${ENV:MINIO_OIDC_SECRET}",
              "redirectUris": ["*"],
              "protocol": "openid-connect",
              "protocolMappers": [
                {
                  "name": "policy-mapper",
                  "protocol": "openid-connect",
                  "protocolMapper": "oidc-hardcoded-claim-mapper",
                  "consentRequired": false,
                  "config": {
                    "claim.name": "policy",
                    "claim.value": "consoleAdmin",
                    "jsonType.label": "String",
                    "access.token.claim": "true",
                    "id.token.claim": "true"
                  }
                }
              ]
            },
            {
              "clientId": "superset",
              "enabled": true,
              "publicClient": false,
              "secret": "${ENV:SUPERSET_OIDC_SECRET}",
              "redirectUris": ["*"],
              "protocol": "openid-connect"
            }
          ]
        }
    # Pass secrets into the config CLI container to interpolate inside the JSON directly from the Unified K8s Secret
    extraEnvVars:
      - name: LDAP_BIND_CREDENTIAL
        valueFrom:
          secretKeyRef:
            name: aetherlake-credentials
            key: ldap-bind-password
      - name: CONTROL_PANEL_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: aetherlake-credentials
            key: control-panel-oidc-secret
      - name: TRINO_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: aetherlake-credentials
            key: trino-oidc-secret
      - name: AIRFLOW_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: aetherlake-credentials
            key: airflow-oidc-secret
      - name: MILVUS_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: aetherlake-credentials
            key: milvus-oidc-secret
      - name: POLARIS_OIDC_SECRET
        valueFrom:
          secretKeyRef:
            name: aetherlake-credentials
            key: polaris-oidc-secret
      - name: MINIO_OIDC_SECRET
        valueFrom:
          secretKeyRef:
            name: aetherlake-credentials
            key: minio-oidc-secret
      - name: SUPERSET_OIDC_SECRET
        valueFrom:
          secretKeyRef:
            name: aetherlake-credentials
            key: superset-oidc-secret
