{{- if .Values.keycloak.enabled }}
# Upstream-maintained Keycloak (quay.io/keycloak/keycloak) backed by the official
# postgres image. Replaces the retired Bitnami keycloak chart. Realm import is
# handled by templates/keycloak-config-cli-job.yaml.
---
# --- PostgreSQL for Keycloak ----------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgres
  labels:
    app.kubernetes.io/name: keycloak-postgres
spec:
  selector:
    app.kubernetes.io/name: keycloak-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-postgres
  labels:
    app.kubernetes.io/name: keycloak-postgres
spec:
  serviceName: keycloak-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.keycloak.postgres.image | quote }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: keycloak
            - name: POSTGRES_USER
              value: keycloak
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: {{ .Values.keycloak.postgres.passwordSecretKey }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "keycloak"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi
---
# --- Realm definition (imported by keycloak-config-cli) --------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  labels:
    app.kubernetes.io/part-of: aetherlake
data:
  aetherlake-realm.json: |-
{{ .Files.Get "files/aetherlake-realm.json" | indent 4 }}
---
# --- Keycloak server -------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-keycloak
  labels:
    app.kubernetes.io/name: keycloak
spec:
  selector:
    app.kubernetes.io/name: keycloak
  ports:
    # Port 80 to match the ingress and the in-cluster issuer URLs the services use.
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-keycloak
  labels:
    app.kubernetes.io/name: keycloak
spec:
  serviceName: {{ .Release.Name }}-keycloak
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image | quote }}
          # Plain `start` auto-runs an implicit build (slower boot, no separate
          # build step needed). Fine for a dev cluster.
          args: ["start"]
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://keycloak-postgres:5432/keycloak"
            - name: KC_DB_USERNAME
              value: keycloak
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: {{ .Values.keycloak.postgres.passwordSecretKey }}
            # Bootstrap admin (Keycloak 26 env names).
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: keycloak-admin-password
            - name: KC_HOSTNAME
              value: "http://keycloak.{{ .Values.global.domain }}"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HEALTH_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
{{- end }}
