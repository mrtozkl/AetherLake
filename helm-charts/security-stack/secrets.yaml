# Example Helm overrides for the security-stack credentials.
#
# NOTE: The default install path does NOT use this file. Credentials are provided
# via the Kubernetes secret `aetherlake-credentials`, which `install.sh` creates
# with randomly generated values (see `global.existingSecret` in values.yaml).
#
# This template is kept only as a reference for operators who prefer to supply
# secrets through Helm directly:
#
#   helm upgrade --install security-stack . -n aetherlake -f secrets.yaml
#
# DO NOT commit real passwords here. Replace the placeholders with values sourced
# from your secret manager (Vault, Sealed Secrets, SOPS, etc.) at deploy time.
secrets:
  keycloakAdminPassword: "CHANGE_ME"
  ldapBindCredential: "CHANGE_ME"
  trinoClientSecret: "CHANGE_ME"
  airflowClientSecret: "CHANGE_ME"
  milvusClientSecret: "CHANGE_ME"
  controlPanelClientSecret: "CHANGE_ME"
  supersetClientSecret: "CHANGE_ME"
