apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-polaris
  labels:
    app: polaris
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: polaris
  template:
    metadata:
      labels:
        app: polaris
    spec:
      containers:
        - name: polaris
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
          env:
            # Polaris vends sub-scoped S3 credentials on createTable/loadTable via
            # the AWS SDK default chain, which reads region and base credentials
            # from AWS_* env vars — not from the per-catalog storage properties.
            # Without these, CREATE TABLE fails ("Unable to load region/credentials
            # from any of the providers"). MinIO ignores the region value.
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: open-lake-credentials
                  key: minio-root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: open-lake-credentials
                  key: minio-root-password
            # Root client credentials are sourced from the cluster secret so they
            # are randomized per install rather than shipped in the chart.
            - name: POLARIS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: open-lake-credentials
                  key: polaris-client-id
            - name: POLARIS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: open-lake-credentials
                  key: polaris-client-secret
            - name: POLARIS_BOOTSTRAP_CREDENTIALS
              value: "POLARIS,$(POLARIS_CLIENT_ID),$(POLARIS_CLIENT_SECRET)"
            - name: POLARIS_AUTHENTICATOR_TYPE
              value: "jwt"
            - name: SMALLRYE_JWT_VERIFY_ISSUER
              value: "http://keycloak.aetherlake.local/realms/aetherlake"
            - name: SMALLRYE_JWT_VERIFY_JWKS_LOCATION
              value: "http://security-stack-keycloak:80/realms/aetherlake/protocol/openid-connect/certs"
            - name: POLARIS_REALM_CONTEXT_RESOLVER_TYPE
              value: "default"
            - name: POLARIS_REALM_CONTEXT_RESOLVER_DEFAULT_REALM
              value: "POLARIS"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
