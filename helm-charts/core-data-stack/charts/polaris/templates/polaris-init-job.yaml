{{- if and .Values.initCatalog .Values.initCatalog.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-polaris-init
  namespace: {{ .Release.Namespace }}
  labels:
    app: polaris-init
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    # Run after the polaris deployment but before fragile later hooks (e.g.
    # superset-init-db). Negative weight keeps catalog creation off the critical
    # path of a failing hook; -5 is still after minio-init (-10) so buckets exist
    # first. The job waits for the Polaris REST API to become ready.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app: polaris-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: polaris-init
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          env:
            - name: POLARIS_URL
              value: "http://{{ .Release.Name }}-polaris:{{ .Values.service.port }}"
            # Bootstrap credentials, sourced from the same secret the Polaris
            # deployment uses so init authenticates with the randomized values.
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: open-lake-credentials
                  key: polaris-client-id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: open-lake-credentials
                  key: polaris-client-secret
            - name: CATALOG_NAME
              value: {{ .Values.initCatalog.name | quote }}
            - name: MINIO_ENDPOINT
              value: {{ .Values.initCatalog.s3Endpoint | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.initCatalog.s3Bucket | quote }}
            # Use the dedicated Polaris S3 user (not root) so the catalog's stored
            # credentials match the identity that vends sub-scoped tokens via STS.
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: open-lake-credentials
                  key: minio-polaris-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: open-lake-credentials
                  key: minio-polaris-secret-key
            # Role ARN Polaris assumes against MinIO STS to vend sub-scoped creds.
            # MinIO ignores the account/role identity (it scopes by the requesting
            # user's policy), but the AWS SDK requires a syntactically valid ARN.
            - name: POLARIS_S3_ROLE_ARN
              value: {{ .Values.initCatalog.roleArn | default "arn:aws:iam::000000000000:role/minio-polaris" | quote }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Polaris REST API to be ready..."
              until curl -s ${POLARIS_URL}/api/management/v1/catalogs > /dev/null; do
                echo "Polaris not ready yet. Retrying in 5 seconds..."
                sleep 5
              done
              
              echo "Polaris is ready. Authenticating..."
              # 1. Get OAuth2 Token
              TOKEN_RESPONSE=$(curl -s -X POST "${POLARIS_URL}/api/catalog/v1/oauth/tokens" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "grant_type=client_credentials&client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&scope=PRINCIPAL_ROLE:ALL")
              
              # Extract token using simple shell scripting since jq is not in curl image
              BEARER_TOKEN=$(echo $TOKEN_RESPONSE | grep -o '"access_token"[^,]*' | awk -F'"' '{print $4}')
              
              if [ -z "$BEARER_TOKEN" ]; then
                echo "Failed to get bearer token. Response: $TOKEN_RESPONSE"
                exit 1
              fi
              
              echo "Authentication successful. Creating catalog '${CATALOG_NAME}'..."
              
              # 2. Check if catalog already exists
              CATALOG_EXISTS=$(curl -s -H "Authorization: Bearer ${BEARER_TOKEN}" "${POLARIS_URL}/api/management/v1/catalogs" | grep -c "\"name\":\"${CATALOG_NAME}\"")
              
              # 3. Create Catalog (skip if it already exists; the grant below is
              # ensured regardless so upgrades repair a catalog created before it).
              if [ "$CATALOG_EXISTS" -gt 0 ]; then
                echo "Catalog '${CATALOG_NAME}' already exists. Skipping creation."
              else
              # Construct JSON payload
              PAYLOAD=$(cat <<EOF
              {
                "catalog": {
                  "name": "${CATALOG_NAME}",
                  "type": "INTERNAL",
                  "properties": {
                    "default-base-location": "s3://${MINIO_BUCKET}/"
                  },
                  "storageConfigInfo": {
                    "storageType": "S3",
                    "roleArn": "${POLARIS_S3_ROLE_ARN}",
                    "allowedLocations": ["s3://${MINIO_BUCKET}/"],
                    "endpoint": "${MINIO_ENDPOINT}",
                    "stsEndpoint": "${MINIO_ENDPOINT}",
                    "pathStyleAccess": true
                  }
                }
              }
              EOF
              )
              
              CREATE_RESPONSE=$(curl -s -X POST "${POLARIS_URL}/api/management/v1/catalogs" \
                -H "Authorization: Bearer ${BEARER_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "${PAYLOAD}")
                
              echo "Create response: $CREATE_RESPONSE"
              
              if echo "$CREATE_RESPONSE" | grep -q "\"name\":\"${CATALOG_NAME}\""; then
                echo "Successfully created catalog '${CATALOG_NAME}'."
              else
                echo "Failed to create catalog. See response above."
                exit 1
              fi
              fi

              # 4. Ensure the auto-created catalog_admin role can manage CONTENT, not
              # just metadata/access. Without CATALOG_MANAGE_CONTENT the service_admin
              # principal is "not authorized for op CREATE_TABLE_STAGED_WITH_WRITE_
              # DELEGATION", so every CREATE TABLE through Trino (which uses Polaris
              # vended credentials) fails with "Failed to create transaction". The
              # grant is idempotent, so it is safe to re-apply on every run.
              echo "Ensuring CATALOG_MANAGE_CONTENT grant on catalog_admin..."
              curl -s -X PUT "${POLARIS_URL}/api/management/v1/catalogs/${CATALOG_NAME}/catalog-roles/catalog_admin/grants" \
                -H "Authorization: Bearer ${BEARER_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"grant":{"type":"catalog","privilege":"CATALOG_MANAGE_CONTENT"}}'
              echo ""
              echo "Catalog initialization complete."
{{- end }}
