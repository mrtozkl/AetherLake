replicaCount: 1

image:
  repository: apache/polaris
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8181

resources:
  limits:
    cpu: 500m
    memory: 1024Mi
  requests:
    cpu: 250m
    memory: 512Mi

initCatalog:
  enabled: true
  name: "lakehouse_catalog"
  s3Endpoint: "http://minio-hl.open-lake.svc.cluster.local:9000"
  s3Bucket: "lakehouse"
