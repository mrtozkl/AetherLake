{{- if or .Values.superset.enabled .Values.airflow.enabled }}
# Shared, upstream-maintained PostgreSQL and Redis for Superset and Airflow.
# These replace the retired Bitnami postgresql/redis subchart images with the
# official postgres / redis images so the stack stays on supported, patched
# builds. Credentials come from the open-lake-credentials secret created by
# install.sh (keys: postgres-password, redis-password).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aetherlake-postgres-init
  labels:
    app.kubernetes.io/part-of: aetherlake
data:
  init.sh: |
    #!/bin/bash
    # Runs once on first boot (official postgres entrypoint). Creates a database
    # and login role per application, both using the shared app password.
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
      CREATE ROLE superset LOGIN PASSWORD '${APP_DB_PASSWORD}';
      CREATE DATABASE superset OWNER superset;
      CREATE ROLE airflow LOGIN PASSWORD '${APP_DB_PASSWORD}';
      CREATE DATABASE airflow OWNER airflow;
    EOSQL
---
apiVersion: v1
kind: Service
metadata:
  name: aetherlake-postgres
  labels:
    app.kubernetes.io/name: aetherlake-postgres
spec:
  selector:
    app.kubernetes.io/name: aetherlake-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aetherlake-postgres
  labels:
    app.kubernetes.io/name: aetherlake-postgres
spec:
  serviceName: aetherlake-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aetherlake-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aetherlake-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: open-lake-credentials
                  key: postgres-password
            # App roles (superset/airflow) are created with this same password.
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: open-lake-credentials
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: init
          configMap:
            name: aetherlake-postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aetherlake-redis
  labels:
    app.kubernetes.io/name: aetherlake-redis
spec:
  selector:
    app.kubernetes.io/name: aetherlake-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aetherlake-redis
  labels:
    app.kubernetes.io/name: aetherlake-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aetherlake-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aetherlake-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: open-lake-credentials
                  key: redis-password
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 5
{{- end }}
