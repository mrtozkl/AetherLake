global:
  # The Control Panel will dynamically provision this Secret and update it via the Kubernetes API
  existingSecret: "open-lake-credentials"
  s3:
    endpoint: "http://minio-hl:9000"
    defaultBucket: "lakehouse"

# 1. MinIO AIStor Configuration (Storage Layer — deployed via Operator Tenant CRD)
minio:
  enabled: true
  # Official MinIO image with full OIDC Console support
  image: "quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z"
  # Standalone dev mode
  servers: 1
  volumesPerServer: 1
  storageSize: "20Gi"
  storageClassName: "hostpath"
  # Root credentials written to the config.env secret. These are overridden at
  # install time (install.sh --set minio.rootUser/rootPassword=...) with the same
  # randomized values stored in the credentials secret under minio-root-user /
  # minio-root-password, so Trino, Milvus and Polaris authenticate successfully.
  # The values below are dev placeholders only.
  rootUser: "minioadmin"
  rootPassword: "CHANGE_ME"
  # Buckets to create on initialization
  initBuckets:
    - "lakehouse"
    - "milvus-vectors"
  # Keycloak OIDC SSO Config
  oidc:
    configUrl: "http://keycloak.aetherlake.local/realms/aetherlake/.well-known/openid-configuration"
    clientId: "minio"
    # Overridden at install time (install.sh --set minio.oidc.clientSecret=...) so
    # it matches the randomized secret of the `minio` Keycloak client. The default
    # below is a dev placeholder only.
    clientSecret: "CHANGE_ME"
    claimName: "policy"
    scopes: "openid,profile,email"
    keycloakRealm: "aetherlake"
    keycloakAdminUrl: "http://security-stack-keycloak/"

# 2. Apache Polaris Custom Chart (Iceberg REST Catalog)
polaris:
  enabled: true
  replicaCount: 1
  initCatalog:
    enabled: true
    name: "lakehouse_catalog"
    s3Endpoint: "http://minio-hl:9000"
    s3Bucket: "lakehouse"

# 3. Trino Configuration (SQL Engine)
trino:
  enabled: true
  server:
    workers: 2
  env:
    # Inject S3 credentials securely into the Trino pods
    - name: MINIO_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: open-lake-credentials
          key: minio-root-user
    - name: MINIO_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: open-lake-credentials
          key: minio-root-password
    # Polaris OAuth2 client credential (id:secret), injected from the secret and
    # referenced below via ${ENV:...} so it is not hardcoded in the catalog file.
    - name: POLARIS_CREDENTIAL
      valueFrom:
        secretKeyRef:
          name: open-lake-credentials
          key: polaris-credential
  additionalCatalogs:
    iceberg: |-
      connector.name=iceberg
      iceberg.catalog.type=rest
      iceberg.rest-catalog.uri=http://core-data-stack-polaris:8181/api/catalog
      iceberg.rest-catalog.warehouse=lakehouse_catalog
      iceberg.rest-catalog.security=OAUTH2
      iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_CREDENTIAL}
      # Polaris requires the OAuth2 scope PRINCIPAL_ROLE:ALL. Supported since the
      # Trino chart was bumped to ship Trino >= 458 (see Chart.yaml: trino 1.42.2).
      iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
      # Use the short-lived, per-table credentials Polaris vends (subscoping)
      # instead of the static keys below. Polaris assumes a MinIO STS role scoped
      # to the table prefix; see the Polaris chart (roleArn + minio-polaris user).
      iceberg.rest-catalog.vended-credentials-enabled=true
      fs.native-s3.enabled=true
      s3.endpoint=http://minio-hl:9000
      s3.region=us-east-1
      # Static keys kept as a fallback for non-vended catalog operations.
      s3.aws-access-key=${ENV:MINIO_ACCESS_KEY}
      s3.aws-secret-key=${ENV:MINIO_SECRET_KEY}
      s3.path-style-access=true

# 4. Apache Spark Operator (Processing Engine)
spark-operator:
  enabled: true
  sparkJobNamespace: "default"

# 5. Apache Airflow (Orchestrator) — official Apache chart, apache/airflow images.
airflow:
  enabled: true
  # Maintained upstream image (Airflow 2.10.5, last 2.x for FAB SSO).
  defaultAirflowRepository: apache/airflow
  defaultAirflowTag: "2.10.5"
  # LocalExecutor: the scheduler runs tasks in-process, so no Celery workers and
  # no Redis broker are needed — one less stateful dependency for a dev cluster.
  executor: LocalExecutor
  # Use the shared, upstream-maintained datastores instead of the chart's bundled
  # Bitnami postgresql/redis subcharts.
  postgresql:
    enabled: false
  redis:
    enabled: false
  # Metadata DB connection, Fernet key and Flask secret key all come from the
  # airflow-official secret created by install.sh (keys: connection / fernet-key
  # / webserver-secret-key).
  data:
    metadataSecretName: airflow-official
  fernetKeySecretName: airflow-official
  webserverSecretKeySecretName: airflow-official
  # Run the DB migration and admin-user jobs as normal resources, NOT Helm hooks.
  # As post-install hooks they share the release's hook chain, which Helm aborts
  # on the first failure — so a slow/failing Superset init hook would silently
  # skip the Airflow migration, leaving scheduler/webserver stuck forever in
  # "Waiting for migrations". Decoupling them makes the migration run regardless.
  migrateDatabaseJob:
    useHelmHooks: false
  createUserJob:
    useHelmHooks: false
  # No Celery components with LocalExecutor.
  workers:
    replicas: 0
  flower:
    enabled: false
  # Don't load Airflow's example DAGs.
  env:
    - name: AIRFLOW__CORE__LOAD_EXAMPLES
      value: "False"
    - name: KEYCLOAK_BASE_URL
      value: "http://keycloak.aetherlake.local"
  # Keycloak OIDC client secret for the webserver_config.py, from the secret.
  extraEnv: |
    - name: AIRFLOW_OIDC_SECRET
      valueFrom:
        secretKeyRef:
          name: aetherlake-credentials
          key: airflow-oidc-secret
  webserver:
    # Keycloak OIDC SSO via Flask AppBuilder. Reuses the webserver_config.py
    # ConfigMap (templates/airflow-webserver-config.yaml), which maps realm roles
    # to Airflow roles for the `airflow` Keycloak client.
    webserverConfigConfigMapName: airflow-webserver-config

# 6. Milvus (Vector Database)
milvus:
  enabled: true
  cluster:
    enabled: false # Use standalone for local cluster to save resources
  standalone:
    enabled: true
    # Use the embedded RocksMQ message queue. The chart default (woodpecker)
    # makes the streaming node build an S3-backed WAL chunk manager, which
    # crash-loops here ("Endpoint url cannot have fully qualified paths").
    # RocksMQ keeps the WAL on the local PVC and needs no external broker.
    messageQueue: rocksmq
  # No external broker needed with RocksMQ.
  pulsarv3:
    enabled: false
  pulsar:
    enabled: false

  # Attu web UI. The `milvus.aetherlake.local` ingress route targets the
  # core-data-stack-milvus-attu service this creates.
  attu:
    enabled: true

  # Disable embedded MinIO to prevent Bitnami common template clashes
  # Instead, point it to the primary MinIO instance we deployed in step 1
  minio:
    enabled: false
  
  externalS3:
    enabled: true
    host: "minio-hl"
    port: 9000
    bucketName: "milvus-vectors"
    # Inject AWS credentials securely
    accessKey: "${ENV:MINIO_ACCESS_KEY}"
    secretKey: "${ENV:MINIO_SECRET_KEY}"

# 7. Apache Superset Configuration
superset:
  enabled: true

  # Use the shared, upstream-maintained PostgreSQL and Redis (templates/
  # shared-datastores.yaml) instead of the retired Bitnami subchart images.
  postgresql:
    enabled: false
  redis:
    enabled: false
  supersetNode:
    connections:
      db_host: aetherlake-postgres
      db_port: "5432"
      db_user: superset
      db_name: superset
      # Placeholder; the real password is injected via extraEnvRaw (DB_PASS)
      # below from the open-lake-credentials secret and overrides this.
      db_pass: overridden-by-secret
      redis_host: aetherlake-redis
      redis_port: "6379"
      # Non-empty so the chart wires Redis auth; real value comes from
      # extraEnvRaw (REDIS_PASSWORD) below.
      redis_password: overridden-by-secret

  # Inject Keycloak OIDC client secret and the real DB/Redis passwords from the
  # unified secret. These env entries override the placeholders the chart bakes
  # into its env secret (env list takes precedence over envFrom).
  extraEnvRaw:
    - name: SUPERSET_OIDC_SECRET
      valueFrom:
        secretKeyRef:
          name: open-lake-credentials
          key: superset-oidc-secret
    - name: DB_PASS
      valueFrom:
        secretKeyRef:
          name: open-lake-credentials
          key: postgres-password
    - name: REDIS_PASSWORD
      valueFrom:
        secretKeyRef:
          name: open-lake-credentials
          key: redis-password

  # Custom initialization: run the standard Superset bootstrap (DB migrate,
  # admin user, init) then auto-import the Trino datasource. The previous script
  # called a non-existent `superset-init` command, which failed the init job.
  init:
    initscript: |-
      #!/bin/sh
      set -e
      superset db upgrade
      superset fab create-admin \
        --username admin --firstname Admin --lastname User \
        --email admin@superset.com --password admin || true
      superset init
      if [ -f /app/configs/import_datasources.yaml ]; then
        superset import_datasources -p /app/configs/import_datasources.yaml || true
      fi

  # Auto-provision Trino database connection on startup
  extraConfigs:
    import_datasources.yaml: |
      databases:
        - database_name: "Trino Analytics"
          sqlalchemy_uri: "trino://admin@core-data-stack-trino:8080/iceberg"
          expose_in_sqllab: true
          allow_run_async: true

  # Install required drivers at runtime. Pin cryptography to Superset 3.1.2's
  # supported range: Authlib otherwise pulls the latest cryptography (49.x),
  # which violates Superset's strict pin (>=42.0.4,<43.0.0) and makes every
  # Superset process (incl. the init-db job) crash on startup with
  # "DistributionNotFound: cryptography".
  bootstrapScript: |
    #!/bin/bash
    PIP_PKGS="sqlalchemy-trino Authlib PyJWT cryptography>=42.0.4,<43.0.0"
    if [ -f /app/.venv/bin/pip ]; then
      /app/.venv/bin/pip install $PIP_PKGS
    else
      pip install $PIP_PKGS
    fi

  # Configuration overrides for Keycloak OIDC SSO Integration
  configOverrides:
    custom_sso: |
      import os
      from flask_appbuilder.security.manager import AUTH_OAUTH
      # Superset 3.x requires a custom security manager to extend Superset's own
      # SupersetSecurityManager, not FAB's SecurityManager (see UPDATING.md [4565]).
      from superset.security import SupersetSecurityManager
      import jwt

      SECRET_KEY = "aetherlake-super-secret-key-that-is-long-enough"
      AUTH_TYPE = AUTH_OAUTH
      AUTH_USER_REGISTRATION = True
      AUTH_USER_REGISTRATION_ROLE = "Public"

      OAUTH_PROVIDERS = [
          {
              "name": "keycloak",
              "token_key": "access_token",
              "icon": "fa-key",
              "remote_app": {
                  "client_id": "superset",
                  "client_secret": os.environ.get("SUPERSET_OIDC_SECRET", "superset-secret-key"),
                  "server_metadata_url": "http://security-stack-keycloak:80/realms/aetherlake/.well-known/openid-configuration",
                  "client_kwargs": {
                      "scope": "openid profile email"
                  }
              }
          }
      ]

      class CustomSsoSecurityManager(SupersetSecurityManager):
          def oauth_user_info(self, provider, response=None):
              if provider == 'keycloak':
                  token = response.get('access_token')
                  try:
                      decoded = jwt.decode(token, options={"verify_signature": False})
                      realm_roles = decoded.get('realm_access', {}).get('roles', [])
                  except Exception:
                      realm_roles = []
                  
                  me = self.appbuilder.sm.oauth_remotes[provider].get('userinfo').json()
                  
                  mapped_roles = ['Gamma']
                  if 'data-admin' in realm_roles:
                      mapped_roles = ['Admin']
                  elif 'data-engineer' in realm_roles or 'data-scientist' in realm_roles:
                      mapped_roles = ['Alpha']
                  
                  return {
                      'username': me.get('preferred_username', me.get('sub')),
                      'first_name': me.get('given_name', ''),
                      'last_name': me.get('family_name', ''),
                      'email': me.get('email', ''),
                      'role_keys': mapped_roles
                  }
              return {}

          def auth_user_oauth(self, userinfo, provider, response=None):
              user = super().auth_user_oauth(userinfo, provider, response)
              if user and provider == 'keycloak':
                  role_keys = userinfo.get('role_keys', ['Gamma'])
                  user.roles = []
                  for role_name in role_keys:
                      role = self.find_role(role_name)
                      if role:
                          user.roles.append(role)
                  self.get_session.commit()
              return user

      CUSTOM_SECURITY_MANAGER = CustomSsoSecurityManager
