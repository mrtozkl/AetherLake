global:
  # The Control Panel will dynamically provision this Secret and update it via the Kubernetes API
  existingSecret: "open-lake-credentials"
  s3:
    endpoint: "http://minio-hl:9000"
    defaultBucket: "lakehouse"

# 1. MinIO AIStor Configuration (Storage Layer — deployed via Operator Tenant CRD)
minio:
  enabled: true
  # Official MinIO image with full OIDC Console support
  image: "quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z"
  # Standalone dev mode
  servers: 1
  volumesPerServer: 1
  storageSize: "20Gi"
  storageClassName: "hostpath"
  # Root credentials (will be written to config.env secret)
  rootUser: "minioadmin"
  rootPassword: "minioadmin"
  # Buckets to create on initialization
  initBuckets:
    - "lakehouse"
    - "milvus-vectors"
  # Keycloak OIDC SSO Config
  oidc:
    configUrl: "http://keycloak.open-lake.local/realms/open-lake/.well-known/openid-configuration"
    clientId: "minio"
    clientSecret: "minio-oidc-secret-123"
    claimName: "policy"
    scopes: "openid,profile,email"
    keycloakRealm: "open-lake"
    keycloakAdminUrl: "http://security-stack-keycloak/"

# 2. Apache Polaris Custom Chart (Iceberg REST Catalog)
polaris:
  enabled: true
  replicaCount: 1
  initCatalog:
    enabled: true
    name: "lakehouse_catalog"
    s3Endpoint: "http://minio-hl:9000"
    s3Bucket: "lakehouse"

# 3. Trino Configuration (SQL Engine)
trino:
  enabled: true
  server:
    workers: 2
  env:
    # Inject S3 credentials securely into the Trino pods
    - name: MINIO_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: open-lake-credentials
          key: minio-root-user
    - name: MINIO_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: open-lake-credentials
          key: minio-root-password
  additionalCatalogs:
    iceberg: |-
      connector.name=iceberg
      iceberg.catalog.type=rest
      iceberg.rest-catalog.uri=http://core-data-stack-polaris:8181/api/catalog
      iceberg.rest-catalog.security=OAUTH2
      iceberg.rest-catalog.oauth2.credential=open-lake-admin:open-lake-secret
      fs.native-s3.enabled=true
      s3.endpoint=http://minio-hl:9000
      s3.region=us-east-1
      s3.aws-access-key=${ENV:MINIO_ACCESS_KEY}
      s3.aws-secret-key=${ENV:MINIO_SECRET_KEY}
      s3.path-style-access=true

# 4. Apache Spark Operator (Processing Engine)
spark-operator:
  enabled: true
  sparkJobNamespace: "default"

# 5. Apache Airflow (Orchestrator)
# Temporarily disabling Airflow as its embedded common templates are polluting MinIO's global scope.
airflow:
  enabled: false
  web:
    # Generic SSO / OIDC configuration will map to the Keycloak client
    extraEnvVars:
      - name: AIRFLOW__WEBSERVER__AUTHENTICATE
        value: "True"
      - name: AIRFLOW__WEBSERVER__AUTH_BACKEND
        value: "airflow.providers.fab.auth_manager.api.auth.backend.default"

# 6. Milvus (Vector Database)
milvus:
  enabled: true
  cluster:
    enabled: false # Use standalone for local cluster to save resources
  standalone:
    enabled: true
  
  # Disable embedded MinIO to prevent Bitnami common template clashes
  # Instead, point it to the primary MinIO instance we deployed in step 1
  minio:
    enabled: false
  
  externalS3:
    enabled: true
    host: "minio-hl"
    port: 9000
    bucketName: "milvus-vectors"
    # Inject AWS credentials securely
    accessKey: "${ENV:MINIO_ACCESS_KEY}"
    secretKey: "${ENV:MINIO_SECRET_KEY}"

# 7. Apache Superset Configuration
superset:
  enabled: true
  
  # Inject Keycloak OIDC client secret from the unified secret
  extraEnvRaw:
    - name: SUPERSET_OIDC_SECRET
      valueFrom:
        secretKeyRef:
          name: open-lake-credentials
          key: superset-oidc-secret
          
  # Custom initialization script to import connections automatically
  init:
    initscript: |-
      #!/bin/sh
      set -e
      superset-init --username admin --firstname Admin --lastname User --email admin@superset.com --password admin
      if [ -f /app/configs/import_datasources.yaml ]; then
        superset import_datasources -p /app/configs/import_datasources.yaml
      fi

  # Auto-provision Trino database connection on startup
  extraConfigs:
    import_datasources.yaml: |
      databases:
        - database_name: "Trino Analytics"
          sqlalchemy_uri: "trino://admin@core-data-stack-trino:8080/iceberg"
          expose_in_sqllab: true
          allow_run_async: true

  # Install required drivers at runtime
  bootstrapScript: |
    #!/bin/bash
    if [ -f /app/.venv/bin/pip ]; then
      /app/.venv/bin/pip install sqlalchemy-trino Authlib PyJWT
    else
      pip install sqlalchemy-trino Authlib PyJWT
    fi

  # Configuration overrides for Keycloak OIDC SSO Integration
  configOverrides:
    custom_sso: |
      import os
      from flask_appbuilder.security.manager import AUTH_OAUTH
      from flask_appbuilder.security.sqla.manager import SecurityManager
      import jwt

      SECRET_KEY = "aetherlake-super-secret-key-that-is-long-enough"
      AUTH_TYPE = AUTH_OAUTH
      AUTH_USER_REGISTRATION = True
      AUTH_USER_REGISTRATION_ROLE = "Public"

      OAUTH_PROVIDERS = [
          {
              "name": "keycloak",
              "token_key": "access_token",
              "icon": "fa-key",
              "remote_app": {
                  "client_id": "superset",
                  "client_secret": os.environ.get("SUPERSET_OIDC_SECRET", "superset-secret-key"),
                  "server_metadata_url": "http://security-stack-keycloak:80/realms/aetherlake/.well-known/openid-configuration",
                  "client_kwargs": {
                      "scope": "openid profile email"
                  }
              }
          }
      ]

      class CustomSsoSecurityManager(SecurityManager):
          def oauth_user_info(self, provider, response=None):
              if provider == 'keycloak':
                  token = response.get('access_token')
                  try:
                      decoded = jwt.decode(token, options={"verify_signature": False})
                      realm_roles = decoded.get('realm_access', {}).get('roles', [])
                  except Exception:
                      realm_roles = []
                  
                  me = self.appbuilder.sm.oauth_remotes[provider].get('userinfo').json()
                  
                  mapped_roles = ['Gamma']
                  if 'data-admin' in realm_roles:
                      mapped_roles = ['Admin']
                  elif 'data-engineer' in realm_roles or 'data-scientist' in realm_roles:
                      mapped_roles = ['Alpha']
                  
                  return {
                      'username': me.get('preferred_username', me.get('sub')),
                      'first_name': me.get('given_name', ''),
                      'last_name': me.get('family_name', ''),
                      'email': me.get('email', ''),
                      'role_keys': mapped_roles
                  }
              return {}

          def auth_user_oauth(self, userinfo, provider, response=None):
              user = super().auth_user_oauth(userinfo, provider, response)
              if user and provider == 'keycloak':
                  role_keys = userinfo.get('role_keys', ['Gamma'])
                  user.roles = []
                  for role_name in role_keys:
                      role = self.find_role(role_name)
                      if role:
                          user.roles.append(role)
                  self.get_session.commit()
              return user

      CUSTOM_SECURITY_MANAGER = CustomSsoSecurityManager
superset:
  postgresql:
    image:
      tag: 15.6.0-debian-12-r12
  redis:
    image:
      tag: 7.2.4-debian-12-r12
