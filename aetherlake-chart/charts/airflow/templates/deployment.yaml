apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-airflow
  labels:
    app: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      # Need to run as root to chown the mounted directory if necessary, but airway image 
      # usually runs as airflow (uid 50000). Let's just mount without special init for now.
      containers:
        - name: airflow
          image: {{ .Values.image }}
          # The 'standalone' command runs the scheduler, webserver, and an init-db process in one container.
          # Great for simple local deployments without needing Redis and Postgres.
          command: ["airflow", "standalone"]
          ports:
            - containerPort: 8080
              name: web
          env:
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "True"
            - name: _AIRFLOW_DB_UPGRADE
              value: "True"
            - name: _AIRFLOW_WWW_USER_CREATE
              value: "True"
            - name: _AIRFLOW_WWW_USER_USERNAME
              value: "admin"
            - name: _AIRFLOW_WWW_USER_PASSWORD
              value: "admin"
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow
      volumes:
        - name: airflow-data
          emptyDir: {}
