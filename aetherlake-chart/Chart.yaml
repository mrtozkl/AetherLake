apiVersion: v2
name: aetherlake-chart
description: Unified Open Source Data Lakehouse with MinIO, Iceberg (Polaris), Trino, Airflow, Spark, dbt, Milvus, and Keycloak
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: minio
    version: 5.0.14
    repository: https://charts.min.io/
    condition: minio.enabled
  - name: trino
    version: 0.20.0
    repository: https://trinodb.github.io/charts
    condition: trino.enabled

  - name: spark-operator
    version: 1.1.27
    repository: https://kubeflow.github.io/spark-operator
    condition: spark-operator.enabled
  - name: milvus
    version: 4.1.28
    repository: https://zilliztech.github.io/milvus-helm/
    condition: milvus.enabled
  - name: keycloak
    version: 18.2.0
    repository: https://charts.bitnami.com/bitnami
    condition: keycloak.enabled
  # Local charts will be placed in the charts/ directory
  # e.g., polaris, control-panel
